<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вход / Регистрация — PC Parts Shop</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background: #ffffff;
      color: #212529;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 15px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 460px;
    }

    .auth-card {
      background: #ffffff;
      border: 1px solid #dee2e6;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .auth-header {
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
      padding: 1.5rem;
      text-align: center;
    }

    .auth-header h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 600;
      color: #0d6efd;
    }

    .nav-tabs .nav-link {
      color: #6c757d;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      padding: 1rem 1.5rem;
      font-weight: 500;
    }

    .nav-tabs .nav-link.active {
      color: #0d6efd;
      border-bottom: 2px solid #0d6efd;
      background: transparent;
    }

    .nav-tabs .nav-link:hover {
      color: #0d6efd;
      border-bottom: 2px solid #0d6efd;
    }

    .tab-content {
      padding: 2rem 1.75rem 1.75rem;
    }

    .form-label {
      color: #495057;
      font-weight: 500;
    }

    .form-control {
      border: 1px solid #ced4da;
      color: #212529;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      background: #fff;
    }

    .form-control:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.25rem rgba(13,110,253,0.15);
      color: #212529;
    }

    .form-control::placeholder {
      color: #adb5bd;
    }

    .btn-primary {
      background: #0d6efd;
      border-color: #0d6efd;
      font-weight: 500;
      padding: 0.75rem;
      border-radius: 6px;
    }

    .btn-primary:hover {
      background: #0b5ed7;
      border-color: #0a58ca;
    }

    .text-link {
      color: #0d6efd;
      text-decoration: none;
    }

    .text-link:hover {
      text-decoration: underline;
    }

    .form-check-input {
      border: 1px solid #ced4da;
    }

    .form-check-input:checked {
      background-color: #0d6efd;
      border-color: #0d6efd;
    }
  </style>
</head>
<body>

<div class="auth-wrapper">

  <div class="auth-card">

    <div class="auth-header">
      <h1>PC Parts Shop</h1>
    </div>

    <ul class="nav nav-tabs justify-content-center" id="authTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Вход</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Регистрация</button>
      </li>
    </ul>

    <div class="tab-content">

      <!-- Вход -->
      <div class="tab-pane fade show active" id="login" role="tabpanel">
        <form>
          <div class="mb-4">
            <label for="login-email" class="form-label">Email или логин</label>
            <input type="text" class="form-control" id="login-email" placeholder="example@pcparts.ru" required>
          </div>

          <div class="mb-4">
            <label for="login-password" class="form-label">Пароль</label>
            <input type="password" class="form-control" id="login-password" placeholder="••••••••" required>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember">
              <label class="form-check-label small" for="remember">Запомнить меня</label>
            </div>
            <a href="#" class="small text-link">Забыли пароль?</a>
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3">Войти</button>

          <p class="text-center mt-4 mb-0 small">
            Нет аккаунта? <a href="#" class="text-link" data-bs-toggle="tab" data-bs-target="#register">Зарегистрироваться</a>
          </p>
        </form>
      </div>

      <!-- Регистрация -->
      <div class="tab-pane fade" id="register" role="tabpanel">
        <form>
          <div class="mb-3">
            <label for="reg-username" class="form-label">Логин / Никнейм</label>
            <input type="text" class="form-control" id="reg-username" placeholder="CyberBuilder" required>
          </div>

          <div class="mb-3">
            <label for="reg-email" class="form-label">Email</label>
            <input type="email" class="form-control" id="reg-email" placeholder="example@pcparts.ru" required>
          </div>

          <div class="mb-3">
            <label for="reg-password" class="form-label">Пароль</label>
            <input type="password" class="form-control" id="reg-password" placeholder="Минимум 8 символов" required>
          </div>

          <div class="mb-4">
            <label for="reg-password2" class="form-label">Повторите пароль</label>
            <input type="password" class="form-control" id="reg-password2" placeholder="••••••••" required>
          </div>

          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="agree" required>
            <label class="form-check-label small" for="agree">
              Соглашаюсь с <a href="#" class="text-link">правилами использования</a> и <a href="#" class="text-link">политикой конфиденциальности</a>
            </label>
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3">Создать аккаунт</button>

          <p class="text-center mt-3 small">
            Уже зарегистрированы? <a href="#" class="text-link" data-bs-toggle="tab" data-bs-target="#login">Войти</a>
          </p>
        </form>
      </div>

    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>

</body>
</html>
